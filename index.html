<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏大厅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .games-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .games-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .game-card {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 15px;
            padding: 30px 20px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #ff8a00 0%, #da1b60 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .game-card:hover::before {
            opacity: 0.1;
        }

        .game-icon {
            font-size: 3em;
            margin-bottom: 15px;
            display: block;
        }

        .game-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
        }

        .game-description {
            font-size: 0.9em;
            color: #666;
            position: relative;
            z-index: 2;
        }

        .wuziqi {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }

        .snake {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .bird {
            background: linear-gradient(135deg, #FFEAA7 0%, #FDCB6E 100%);
        }

        .footer {
            margin-top: 30px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 游戏大厅</h1>
        <div class="games-grid">
            <a href="./wuziqi/index.html" class="game-card wuziqi">
                <span class="game-icon">⚫⚪</span>
                <h2 class="game-title">五子棋</h2>
                <p class="game-description">经典策略棋类游戏</p>
            </a>
            <a href="./snake/index.html" class="game-card snake">
                <span class="game-icon">🐍</span>
                <h2 class="game-title">贪吃蛇</h2>
                <p class="game-description">怀旧经典街机游戏</p>
            </a>
            <a href="./bird/index.html" class="game-card bird">
                <span class="game-icon">🐦</span>
                <h2 class="game-title">疯狂小鸟</h2>
                <p class="game-description">物理弹射益智游戏</p>
            </a>
        </div>
        <div class="footer">
            <p>点击游戏卡片开始您的游戏之旅！</p>
        </div>
    </div>
</body>
</html>
